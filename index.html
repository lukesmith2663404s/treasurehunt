<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Treasure Hunt</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main id="app">

        <section id="clueGrid" class="clue-grid" aria-label="Treasure Hunt Clues">

            <!-- Generated by JavaScript -->

        </section>

    </main>

    <!-- ========================= -->
    <!-- CLUE POPUP -->
    <!-- ========================= -->

    <div id="clueOverlay" class="overlay hidden">

        <div class="popup clue-popup">

            <button class="closeButton" id="closeClueButton">
                ✕
            </button>

            <h2 id="clueTitle">
                Clue
            </h2>

            <img
                id="clueImage"
                class="hidden"
                alt="Clue Image">

            <p id="clueText"></p>

            <input
                id="answerInput"
                type="text"
                autocomplete="off"
                autocapitalize="off"
                spellcheck="false"
                placeholder="Enter your answer">

            <button id="submitAnswerButton" class="mainButton">
                Submit
            </button>

            <button id="hintButton" class="secondaryButton">
                Ask For Hint
            </button>

        </div>

    </div>

    <!-- ========================= -->
    <!-- HINT TASK -->
    <!-- ========================= -->

    <div id="hintTaskOverlay" class="overlay hidden">

        <div class="popup">

            <h2>
                Need a Hint?
            </h2>

            <p id="hintTaskText">

            </p>

            <button id="completedTaskButton" class="mainButton">
                I've Completed The Task
            </button>

        </div>

    </div>

    <!-- ========================= -->
    <!-- HINT -->
    <!-- ========================= -->

    <div id="hintOverlay" class="overlay hidden">

        <div class="popup">

            <h2>
                Hint
            </h2>

            <p id="hintText">

            </p>

            <button id="closeHintButton" class="mainButton">
                Close
            </button>

        </div>

    </div>

    <!-- ========================= -->
    <!-- WRONG ANSWER -->
    <!-- ========================= -->

    <div id="wrongOverlay" class="hidden">

        <img
            id="wrongGif"
            src=""
            alt="Wrong Answer">

        <audio id="wrongSound">
            <source src="assets/wrong.mp3" type="audio/mpeg">
        </audio>

    </div>

    <!-- ========================= -->
    <!-- FINAL CLUE -->
    <!-- ========================= -->

    <div id="finalOverlay" class="overlay hidden">

        <div class="popup">

            <h2>
                Congratulations!
            </h2>

            <p>

                You completed every clue.

            </p>

            <button id="showFinalButton" class="mainButton">

                Reveal Final Clue

            </button>

        </div>

    </div>

    <script src="preload.js"></script>
    <script src="clues.js"></script>
    <script src="script.js"></script>

</body>
</html>
